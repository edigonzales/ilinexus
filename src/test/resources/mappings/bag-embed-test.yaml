version: 1

job:
  name: bag-embed-test
  direction: flat-to-nested
  failPolicy: strict
  inputs:
    - id: flat
      path: "input/bag-flat.itf"
      model: "BagFlatSource"
      format: "itf"
  outputs:
    - id: nested
      path: "build/out/bag-nested.xtf"
      model: "BagNestedTarget"
      format: "xtf"

mapping:
  oidStrategy:
    default: deterministicUuid
    namespace: "test-bag-embed"
  basketStrategy:
    default: preserveOrGenerateUuid

  rules:
    - id: parent-rule
      target:
        output: nested
        class: "BagNestedTarget.NestedTopic.Parent"
      sources:
        - alias: p
          input: flat
          class: "BagFlatSource.FlatTopic.Parent"
      identity:
        sourceKey: ["p.ParentId"]
      assign:
        ParentId: "p.ParentId"
        Description: "p.Description"
      bags:
        Positions:
          from:
            input: flat
            class: "BagFlatSource.FlatTopic.Child"
            alias: c
          structure: "BagNestedTarget.NestedTopic.Position"
          parentRef:
            attribute: "ParentId"
            parentAlias: "p"
          assign:
            X: "c.X"
            Y: "c.Y"
